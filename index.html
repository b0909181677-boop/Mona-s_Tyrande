<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 泰劇腐劇 CP 整理站</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Caveat',cursive;background:#FFE4CA;min-height:100vh;}

/* ===== HOME ===== */
.home{padding:2rem 1.2rem 2.5rem;}
.home-title{text-align:center;font-size:2.2rem;font-weight:700;color:#7a5c3a;letter-spacing:2px;margin-bottom:.3rem;}
.home-sub{text-align:center;font-size:1.05rem;color:#b08b6e;margin-bottom:1.5rem;letter-spacing:1px;}
.home-divider{border:none;border-top:1.5px dashed #c9a882;margin:0 auto 1.5rem;width:60%;}
.btn-grid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
.cp-btn{background:#f5dfc0;border:1.5px solid #c9a882;border-radius:20px;color:#6b4c2e;font-family:'Caveat',cursive;font-size:1rem;padding:6px 16px;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap;line-height:1.3;}
.cp-btn:hover{background:#d9a96e;color:#fff8f0;transform:translateY(-2px) scale(1.03);}
.cp-btn.special{background:#e8c89a;border-color:#b07a45;color:#5a3a1a;font-size:1.1rem;}
.cp-btn .sub{display:block;font-size:.75rem;color:#9a6e44;}
.cp-btn.special .sub{color:#7a5030;}
.deco{text-align:center;color:#c9a882;font-size:1.1rem;letter-spacing:6px;margin-top:1.5rem;}

/* ===== SHELF PAGE ===== */
.shelf-page{display:none;}
.shelf-page.active{display:block;}
.topbar{background:#6b3f1e;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.back-btn{background:#f5dfc0;border:none;border-radius:20px;color:#6b3f1e;font-family:'Caveat',cursive;font-size:.95rem;padding:4px 14px;cursor:pointer;flex-shrink:0;}
.back-btn:hover{background:#d9a96e;color:#fff;}
.cp-name{color:#ffe4ca;font-size:1.4rem;font-weight:600;letter-spacing:1px;}
.cp-aka{color:#d9b89a;font-size:.95rem;margin-left:2px;}
.edit-btn{margin-left:auto;background:transparent;border:1.5px solid #c9a882;border-radius:20px;color:#d9b89a;font-family:'Caveat',cursive;font-size:.9rem;padding:3px 14px;cursor:pointer;flex-shrink:0;}
.edit-btn:hover{background:#c9a882;color:#fff8f0;}
.export-btn{background:transparent;border:1.5px solid #a0c890;border-radius:20px;color:#a0d890;font-family:'Caveat',cursive;font-size:.9rem;padding:3px 14px;cursor:pointer;flex-shrink:0;}
.export-btn:hover{background:#a0c890;color:#fff8f0;}

.shelf-room{background:#3d1f0a;padding:16px 20px 0;}
.shelf-label{color:#c9a882;font-size:.95rem;text-align:center;letter-spacing:2px;padding:8px 0 12px;}
.shelf{background:#5a2d0c;border-radius:4px 4px 0 0;padding:16px 18px 0;}
.shelf::after{content:'';display:block;height:13px;background:#7a4520;border-radius:0 0 3px 3px;margin:0 -18px;}
.shelf-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;padding-bottom:6px;}
.floor{height:18px;background:#2a1204;}

.book{width:90px;cursor:pointer;transition:transform .2s;flex-shrink:0;}
.book:hover{transform:translateY(-8px) scale(1.04);}
.book-cover{width:90px;height:130px;border-radius:3px 7px 7px 3px;position:relative;border-left:6px solid rgba(0,0,0,0.3);overflow:hidden;background:#8a6040;}
.book-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.book-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(40,15,3,.85));padding:20px 5px 5px;}
.book-name{color:#ffe4ca;font-size:.75rem;font-family:'Caveat',cursive;text-align:center;line-height:1.2;font-weight:600;}

/* ===== MODAL ===== */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(42,18,4,.75);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-wrap.open{display:flex;}
.modal{background:#fff8f0;border-radius:14px;border:2px solid #c9a882;max-width:400px;width:100%;overflow:hidden;max-height:90vh;overflow-y:auto;}
.modal-img{width:100%;height:200px;object-fit:cover;display:block;background:#c9a882;}
.modal-img-ph{width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:#c9a882;font-size:2.5rem;}
.modal-body{padding:16px 20px 18px;}
.modal-title{font-size:1.45rem;font-weight:700;color:#5a2d0c;margin-bottom:2px;}
.modal-cp-tag{color:#b07a45;font-size:.9rem;margin-bottom:10px;}
.modal-note{color:#5a3a1a;font-size:.98rem;line-height:1.65;margin-bottom:14px;white-space:pre-wrap;}
.modal-btns{display:flex;gap:8px;}
.modal-close{background:#7a4520;border:none;border-radius:20px;color:#ffe4ca;font-family:'Caveat',cursive;font-size:.95rem;padding:6px 20px;cursor:pointer;flex:1;}
.modal-close:hover{background:#5a2d0c;}
.modal-reroll{background:#c9a882;border:none;border-radius:20px;color:#fff8f0;font-family:'Caveat',cursive;font-size:.95rem;padding:6px 20px;cursor:pointer;flex:1;display:none;}
.modal-reroll:hover{background:#b07a45;}

/* ===== EDIT PANEL ===== */
.edit-panel{display:none;background:#fff8f0;border-top:2px dashed #c9a882;padding:18px 20px;}
.edit-panel.open{display:block;}
.edit-panel h3{color:#7a4520;font-size:1.2rem;margin-bottom:12px;}
.edit-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.edit-item{background:#f5dfc0;border:1.5px solid #c9a882;border-radius:10px;padding:10px 12px;}
.edit-item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.edit-item-title{font-weight:600;color:#5a2d0c;font-size:1rem;flex:1;}
.edit-item-del{background:#d9a96e;border:none;border-radius:12px;color:#fff;font-size:.8rem;padding:2px 10px;cursor:pointer;font-family:'Caveat',cursive;}
.edit-item-del:hover{background:#b07a45;}
.edit-field{width:100%;border:1px solid #c9a882;border-radius:8px;padding:5px 8px;font-family:'Caveat',cursive;font-size:.92rem;color:#5a3a1a;background:#fff8f0;resize:vertical;margin-bottom:4px;}
.edit-img-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.edit-img-preview{width:40px;height:56px;object-fit:cover;border-radius:4px;border:1px solid #c9a882;}
.edit-img-ph{width:40px;height:56px;background:#c9a882;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;}
.edit-upload-btn{background:#e8c89a;border:1.5px solid #c9a882;border-radius:12px;color:#6b4c2e;font-family:'Caveat',cursive;font-size:.85rem;padding:3px 12px;cursor:pointer;}
.add-drama-btn{background:#e8c89a;border:1.5px solid #b07a45;border-radius:16px;color:#5a3a1a;font-family:'Caveat',cursive;font-size:.95rem;padding:6px 18px;cursor:pointer;margin-top:10px;}
.add-drama-btn:hover{background:#d9a96e;color:#fff8f0;}
.save-edit-btn{background:#7a4520;border:none;border-radius:20px;color:#ffe4ca;font-family:'Caveat',cursive;font-size:1rem;padding:8px 24px;cursor:pointer;margin-top:14px;width:100%;}
.save-edit-btn:hover{background:#5a2d0c;}
</style>
</head>
<body>

<div id="home" class="home">
  <div class="home-title">🌸 泰劇腐劇 CP 整理站</div>
  <div class="home-sub">選擇你最愛的 CP，開始探索 ✦</div>
  <hr class="home-divider">
  <div class="btn-grid" id="btn-grid"></div>
  <div class="deco">✦ ✦ ✦</div>
</div>

<div id="shelf-page" class="shelf-page">
  <div class="topbar">
    <button class="back-btn" onclick="showHome()">← 返回</button>
    <span class="cp-name" id="shelf-name"></span>
    <span class="cp-aka" id="shelf-aka"></span>
    <button class="edit-btn" onclick="toggleEdit()">✏️ 編輯</button>
    <button class="export-btn" onclick="exportHTML()">💾 匯出</button>
  </div>
  <div class="shelf-room">
    <div class="shelf-label">✦ 他們的作品書架 ✦</div>
    <div class="shelf"><div class="shelf-row" id="shelf-row"></div></div>
    <div class="floor"></div>
  </div>
  <div class="edit-panel" id="edit-panel">
    <h3>✏️ 編輯劇單</h3>
    <ul class="edit-list" id="edit-list"></ul>
    <button class="add-drama-btn" onclick="addDrama()">＋ 新增一部劇</button>
    <button class="save-edit-btn" onclick="saveEdit()">💾 儲存變更</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-wrap" id="modal-wrap" onclick="handleModalBg(event)">
  <div class="modal" id="modal-box">
    <img class="modal-img" id="modal-img" src="" alt="" onerror="this.style.display='none';document.getElementById('modal-img-ph').style.display='flex'">
    <div class="modal-img-ph" id="modal-img-ph" style="display:none;">🎬</div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-cp-tag" id="modal-cp-tag"></div>
      <div class="modal-note" id="modal-note"></div>
      <div class="modal-btns">
        <button class="modal-close" onclick="closeModal()">✕ 關閉</button>
        <button class="modal-reroll" id="modal-reroll" onclick="rollRandom()">🎲 再抽一部</button>
      </div>
    </div>
  </div>
</div>

// ===== STATE =====
var currentCpIdx = -1;
var editingCpDramas = null; // deep copy for editing

function getCpData(idx) {
  var cp = CPS[idx];
  var saved = localStorage.getItem('cp_edit_' + cp.id);
  if (saved) { try { return JSON.parse(saved); } catch(e){} }
  return cp.dramas.map(function(d){ return {t:d.t, note:d.note, img:d.img}; });
}

// ===== HOME =====
function buildHome() {
  var grid = document.getElementById('btn-grid');
  grid.innerHTML = '';
  for (var i = 0; i < CPS.length; i++) {
    (function(idx) {
      var cp = CPS[idx];
      var btn = document.createElement('button');
      btn.className = 'cp-btn' + (cp.id === 'Other' ? ' special' : '');
      btn.innerHTML = cp.name + (cp.aka ? '<span class="sub">' + cp.aka + '</span>' : '');
      btn.onclick = function() { showShelf(idx); };
      grid.appendChild(btn);
    })(i);
  }
  var rBtn = document.createElement('button');
  rBtn.className = 'cp-btn special';
  rBtn.innerHTML = '🎲 隨機推薦一部劇';
  rBtn.onclick = rollRandom;
  grid.appendChild(rBtn);
}

// ===== SHELF =====
function showShelf(idx) {
  currentCpIdx = idx;
  var cp = CPS[idx];
  document.getElementById('home').style.display = 'none';
  document.getElementById('shelf-page').className = 'shelf-page active';
  document.getElementById('shelf-name').textContent = cp.name;
  document.getElementById('shelf-aka').textContent = cp.aka ? '（' + cp.aka + '）' : '';
  document.getElementById('edit-panel').className = 'edit-panel';
  renderShelf(idx);
}

function renderShelf(idx) {
  var dramas = getCpData(idx);
  var row = document.getElementById('shelf-row');
  row.innerHTML = '';
  if (!dramas.length) {
    row.innerHTML = '<div style="color:#c9a882;font-family:Caveat,cursive;font-size:1.1rem;padding:1rem;">尚無資料 🌿</div>';
    return;
  }
  dramas.forEach(function(d, i) {
    var book = document.createElement('div');
    book.className = 'book';
    var imgHtml = d.img
      ? '<img src="' + d.img + '" alt="' + d.t + '">'
      : '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.6rem;">🎬</div>';
    book.innerHTML = '<div class="book-cover">' + imgHtml + '<div class="book-overlay"><div class="book-name">' + d.t + '</div></div></div>';
    book.onclick = (function(drama, cpIdx) {
      return function() { openModal(drama, CPS[cpIdx].name, CPS[cpIdx].aka, false); };
    })(d, idx);
    row.appendChild(book);
  });
}

function showHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('shelf-page').className = 'shelf-page';
  closeModal();
}

// ===== MODAL =====
function openModal(d, cpName, cpAka, isRandom) {
  var imgEl = document.getElementById('modal-img');
  var phEl = document.getElementById('modal-img-ph');
  if (d.img) {
    imgEl.src = d.img;
    imgEl.style.display = 'block';
    phEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    phEl.style.display = 'flex';
  }
  document.getElementById('modal-title').textContent = d.t;
  document.getElementById('modal-cp-tag').textContent = '✦ CP：' + cpName + (cpAka ? ' （' + cpAka + '）' : '');
  document.getElementById('modal-note').textContent = d.note || '（備註待補）';
  document.getElementById('modal-reroll').style.display = isRandom ? 'inline-block' : 'none';
  document.getElementById('modal-wrap').className = 'modal-wrap open';
}

function closeModal() {
  document.getElementById('modal-wrap').className = 'modal-wrap';
}

function handleModalBg(e) {
  if (e.target === document.getElementById('modal-wrap')) closeModal();
}

// ===== RANDOM =====
function rollRandom() {
  var all = [];
  CPS.forEach(function(cp, idx) {
    getCpData(idx).forEach(function(d) {
      all.push({d: d, cpName: cp.name, cpAka: cp.aka});
    });
  });
  var pick = all[Math.floor(Math.random() * all.length)];
  openModal(pick.d, pick.cpName, pick.cpAka, true);
}

// ===== EDIT =====
function toggleEdit() {
  var panel = document.getElementById('edit-panel');
  if (panel.classList.contains('open')) {
    panel.className = 'edit-panel';
  } else {
    panel.className = 'edit-panel open';
    buildEditList();
  }
}

function buildEditList() {
  var dramas = getCpData(currentCpIdx);
  editingCpDramas = dramas.map(function(d){ return {t:d.t, note:d.note, img:d.img}; });
  renderEditList();
}

function renderEditList() {
  var list = document.getElementById('edit-list');
  list.innerHTML = '';
  editingCpDramas.forEach(function(d, i) {
    var li = document.createElement('li');
    li.className = 'edit-item';
    li.dataset.idx = i;
    var imgHtml = d.img
      ? '<img class="edit-img-preview" id="edit-img-preview-' + i + '" src="' + d.img + '">'
      : '<div class="edit-img-ph" id="edit-img-preview-' + i + '">🎬</div>';
    li.innerHTML =
      '<div class="edit-item-head">' +
        '<span class="edit-item-title">第 ' + (i+1) + ' 部</span>' +
        '<button class="edit-item-del" onclick="deleteDrama(' + i + ')">✕ 刪除</button>' +
      '</div>' +
      '<input class="edit-field" type="text" value="' + escHtml(d.t) + '" placeholder="劇名" oninput="editingCpDramas[' + i + '].t=this.value">' +
      '<textarea class="edit-field" rows="3" placeholder="備註" oninput="editingCpDramas[' + i + '].note=this.value">' + escHtml(d.note||'') + '</textarea>' +
      '<div class="edit-img-row">' +
        imgHtml +
        '<label><button class="edit-upload-btn" onclick="triggerImgUpload(' + i + ')">🖼️ 換圖片</button></label>' +
        '<input type="file" id="edit-img-input-' + i + '" accept="image/*" style="display:none" onchange="handleImgUpload(' + i + ',this)">' +
      '</div>';
    list.appendChild(li);
  });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function deleteDrama(i) {
  if (confirm('確定刪除「' + editingCpDramas[i].t + '」？')) {
    editingCpDramas.splice(i, 1);
    renderEditList();
  }
}

function addDrama() {
  editingCpDramas.push({t:'新劇名', note:'', img:''});
  renderEditList();
  document.getElementById('edit-list').lastChild.scrollIntoView({behavior:'smooth'});
}

function triggerImgUpload(i) {
  document.getElementById('edit-img-input-' + i).click();
}

function handleImgUpload(i, input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    editingCpDramas[i].img = e.target.result;
    var prev = document.getElementById('edit-img-preview-' + i);
    if (prev) {
      var img = document.createElement('img');
      img.className = 'edit-img-preview';
      img.id = 'edit-img-preview-' + i;
      img.src = e.target.result;
      prev.parentNode.replaceChild(img, prev);
    }
  };
  reader.readAsDataURL(file);
}

function saveEdit() {
  var cp = CPS[currentCpIdx];
  localStorage.setItem('cp_edit_' + cp.id, JSON.stringify(editingCpDramas));
  document.getElementById('edit-panel').className = 'edit-panel';
  renderShelf(currentCpIdx);
  alert('✦ 儲存成功！');
}


// ===== EXPORT =====
function exportHTML() {
  // Build current full data including localStorage edits
  var exportCPS = CPS.map(function(cp) {
    var dramas = getCpData(CPS.indexOf(cp));
    return {id:cp.id, name:cp.name, aka:cp.aka, dramas:dramas};
  });

  // Get current HTML and replace the CPS variable with updated data
  var src = document.documentElement.outerHTML;
  
  // Replace the CPS data block with the latest saved version
  var newCpsJs = 'var CPS=' + JSON.stringify(exportCPS) + ';';
  
  // Find and replace var CPS=[...]; in the source
  var updated = src.replace(/var CPS=\[[\s\S]*?\];(?=\s*\/\/ ===== STATE)/, newCpsJs);
  
  // Remove any localStorage references so exported file is self-contained
  // (data is already baked in, no need for localStorage on fresh load)
  
  var blob = new Blob([updated], {type: 'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'thai_bl.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
